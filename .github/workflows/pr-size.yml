name: PR Size Label

on:
    pull_request:
        types: [opened, synchronize]

permissions:
    pull-requests: write

jobs:
    size-label:
        runs-on: ubuntu-latest
        steps:
            - name: Label PR by size
              uses: codelytv/pr-size-labeler@v1
              with:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  xs_label: 'size/xs'
                  xs_max_size: 10
                  s_label: 'size/s'
                  s_max_size: 50
                  m_label: 'size/m'
                  m_max_size: 200
                  l_label: 'size/l'
                  l_max_size: 500
                  xl_label: 'size/xl'
                  fail_if_xl: false
